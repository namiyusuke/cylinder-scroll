<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curved Card Cylinder Scroll — Three.js Demo</title>
<script type="module" src="/src/swup.js"></script>
</head>
<body>
  <main id="swup" class="transition-fade">
      <p style="position: fixed; top: 20px; left: 20px; z-index: 30;">
        <a class="link" href="/"></a>
      </p>
  </main>
  <div class="cursor">
    <div class="cursor-dot"></div>
    <div class="cursor-circle"></div>
  </div>
</body>
</html>
